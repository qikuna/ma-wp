<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ayudantía MA - Ayudantías</title>
    
    <script>
        window.MathJax = {
          tex: {
            inlineMath: [["\\(", "\\)"]],
            displayMath: [["\\[", "\\]"]],
            processEscapes: true,
            processEnvironments: true
          },
          options: {
            ignoreHtmlClass: ".*|",
            processHtmlClass: "arithmatex"
          }
        };
    </script>
    <script src="https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js" async></script>

    <style>
        :root {
            --fondo: #1e1e2e;
            --texto: #cdd6f4;
            --titulos: #ffffff;
            --links: #89b4fa;
            --bloques: #252538;
        }

        body {
            background-color: var(--fondo);
            color: var(--texto);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.7;
            max-width: 760px;
            margin: 0 auto;
            padding: 3rem 1.5rem;
        }

        /* Estilo del Contenido */
        h1, h2, h3, h4 {
            color: var(--titulos);
            font-weight: 700;
            margin-top: 2.5rem;
            margin-bottom: 1rem;
        }

        h1 { font-size: 2.2rem; border-bottom: 1px solid #313244; padding-bottom: 0.5rem; }
        h2 { font-size: 1.6rem; }

        a { color: var(--links); text-decoration: none; }
        a:hover { text-decoration: underline; }

        code {
            background-color: var(--bloques);
            padding: 0.2rem 0.4rem;
            border-radius: 4px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.9em;
        }

        pre {
            background-color: var(--bloques);
            padding: 1rem;
            border-radius: 8px;
            overflow-x: auto;
        }

        pre code {
            background-color: transparent;
            padding: 0;
        }

        .arithmatex {
            color: var(--titulos);
        }

        .todo-centrado {
            text-align: center;
        }
    </style>
</head>
<body>

    <main class="">
        <h1 id="ayudantias">Ayudantías</h1>
<h2 id="laboratorio-1">Laboratorio 1</h2>
<p>Ayudantía: <a href="https://drive.google.com/uc?export=download&amp;id=1DUb3AcxYR-f73Wujo_HbeZj__bK3Gtv6">Desarrollo en MATLAB</a>, <a href="https://drive.google.com/uc?export=download&amp;id=1lEpD9mKE9njYy7e887ycwsauip6dTYKo">Otras extensiones</a>.  </p>
<p>Laboratorio: <a href="https://docs.google.com/spreadsheets/d/1YbhcmzGXCiLKziIAbT7ZM3WP9mRcgZeoaRFDhyMC40s/edit?usp=sharing">Notas</a>, <a href="https://drive.google.com/uc?export=download&amp;id=1IXRPb-8uXO5zLDhzlJjW3c69ZQ1X7Rb-">Pauta</a>.  </p>
<h2 id="laboratorio-2">Laboratorio 2</h2>
<p>Ayudantía: <a href="https://drive.usercontent.google.com/download?id=1X2_LV2vZVKNQoH2_SxJulZw11IKBnr3o&amp;export=download">Ejercicio</a>.  </p>
<p>Laboratorio: <a href="https://imageresizer.com/es/generador-de-memes/editar/drip-goku">Notas</a>, <a href="https://www.tiktok.com/@ivan.bozzo/video/7528109027541191943">Pauta</a>.  </p>
    </main>

</body>
</html>
